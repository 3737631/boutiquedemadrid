<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique de Tendencia | Pedidos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Tenor+Sans&family=JetBrains+Mono:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        :root { --border: #222; }

        header {
            display: flex; align-items: center; justify-content: center; padding: 1.2rem 2rem;
            background: rgba(0,0,0,0.97); border-bottom: 1px solid var(--border);
            font-family: 'Tenor Sans', sans-serif; font-size: 1rem; letter-spacing: 6px; text-transform: uppercase;
            position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

        .cart-section {
            background: #0a0a0a; border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .cart-section h2 { font-family: 'Tenor Sans', sans-serif; font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; margin-bottom: 1rem; }
        .cart-items { display: flex; flex-direction: column; gap: 6px; }
        .cart-row { display: flex; align-items: center; gap: 10px; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; }
        .cart-row .c-name { flex: 1; }
        .cart-row .c-price { color: #888; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; min-width: 60px; text-align: right; }
        .cart-row .c-qty { display: flex; align-items: center; gap: 6px; }
        .cart-row .c-qty button { width: 24px; height: 24px; border: 1px solid #333; background: transparent; color: #fff; font-size: 0.8rem; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .cart-row .c-qty button:hover { border-color: #fff; }
        .cart-row .c-qty span { min-width: 18px; text-align: center; font-weight: 600; }
        .cart-row .c-del { background: none; border: none; color: #555; cursor: pointer; font-size: 0.9rem; padding: 0 4px; }
        .cart-row .c-del:hover { color: #ff4444; }
        .cart-empty { color: #555; font-size: 0.8rem; text-align: center; padding: 1.5rem 0; }
        .cart-total { display: flex; justify-content: space-between; font-weight: 700; padding-top: 0.8rem; font-size: 0.9rem; }

        .order-form { display: flex; flex-direction: column; gap: 0.8rem; }
        .order-form label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #555; }
        .order-form input, .order-form textarea {
            width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border); background: transparent; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.8rem; outline: none; border-radius: 12px;
        }
        .order-form input:focus, .order-form textarea:focus { border-color: #fff; }
        .order-form textarea { min-height: 60px; resize: vertical; }

        .add-product-toggle {
            background: none; border: 1px solid #333; color: #888; padding: 0.6rem 1rem; border-radius: 50px;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; font-family: inherit;
            transition: all 0.2s; width: fit-content;
        }
        .add-product-toggle:hover { border-color: #fff; color: #fff; }

        .extra-product-form { display: none; flex-direction: column; gap: 0.5rem; padding: 1rem; background: #0d0d0d; border-radius: 12px; margin-top: 0.3rem; }
        .extra-product-form.show { display: flex; }
        .extra-product-form .ep-row { display: grid; grid-template-columns: 1fr 2fr 1fr auto; gap: 8px; align-items: center; }
        .extra-product-form input { padding: 0.5rem; border: 1px solid #333; background: transparent; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.75rem; outline: none; border-radius: 8px; }
        .extra-product-form input:focus { border-color: #fff; }
        .extra-product-form button { background: #fff; color: #000; border: none; padding: 0.5rem 0.8rem; border-radius: 8px; font-size: 0.7rem; cursor: pointer; font-weight: 600; }
        .extra-product-form button:hover { background: #ccc; }

        .btn-whatsapp {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #25D366; color: #000; border: none; padding: 1rem; border-radius: 50px;
            font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit;
            transition: background 0.2s; width: 100%; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-whatsapp:hover { background: #1da851; }

        .sheet-section { margin-top: 1.5rem; }
        .sheet-section h3 { font-family: 'Tenor Sans', sans-serif; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 0.8rem; }
        .sheet-nav { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 0.8rem; }
        .sheet-nav button {
            padding: 6px 14px; border: 1px solid #333; font-size: 9px; font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; background: transparent; color: #666;
            transition: all 0.2s; border-radius: 4px;
        }
        .sheet-nav button:hover { background: #111; color: #fff; }
        .sheet-nav button.active { background: #fff; color: #000; border-color: #fff; }
        .sheet-frame-wrap {
            border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: #fff;
            width: 100%; height: 500px; position: relative;
        }
        .sheet-frame-wrap iframe { width: 100%; height: 100%; border: none; }

        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }

        .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 500; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .toast { background: #fff; color: #000; padding: 0.7rem 1rem; font-size: 0.75rem; transform: translateY(20px); opacity: 0; transition: all 0.3s; border-radius: 12px; pointer-events: all; }
        .toast.show { transform: translateY(0); opacity: 1; }

        .cart-count-badge {
            position: fixed; top: 0.9rem; right: 1.5rem; background: #fff; color: #000;
            font-size: 0.6rem; padding: 2px 8px; border-radius: 50px; font-weight: 700; z-index: 101;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .sheet-frame-wrap { height: 400px; }
            .extra-product-form .ep-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    BOUTIQUE DE TENDENCIA
    <span class="cart-count-badge" id="cartCountBadge">0</span>
</header>

<div class="container">

    <!-- CART SECTION -->
    <div class="cart-section">
        <h2>🛒 Tu Pedido</h2>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">No has añadido productos aún.</div>
        </div>
        <div class="cart-total" id="cartTotalRow" style="display:none;">
            <span>TOTAL</span>
            <span id="cartTotal">0 €</span>
        </div>
    </div>

    <!-- ORDER FORM -->
    <div class="order-form">
        <label>Tu nombre</label>
        <input type="text" id="customerName" placeholder="Ej: María García">

        <label>Notas del pedido (opcional)</label>
        <textarea id="orderNotes" placeholder="Tallas, colores, observaciones..."></textarea>

        <!-- Add product from sheet -->
        <button class="add-product-toggle" onclick="toggleExtraProduct()">+ Añadir producto del catálogo</button>
        <div class="extra-product-form" id="extraProductForm">
            <div class="ep-row">
                <input type="text" id="epNum" placeholder="Nº">
                <input type="text" id="epName" placeholder="Nombre del producto">
                <input type="text" id="epPrice" placeholder="Precio">
                <button onclick="addExtraProduct()">Añadir</button>
            </div>
        </div>

        <!-- WHATSAPP BUTTON -->
        <button class="btn-whatsapp" onclick="sendWhatsApp()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Enviar Pedido por WhatsApp
        </button>
    </div>

    <!-- SHEET SECTION -->
    <div class="sheet-section">
        <h3>📋 Catálogo de productos</h3>
        <div class="sheet-nav" id="sheetNav"></div>
        <div class="sheet-frame-wrap">
            <iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/17heLb9KsXufVvnBonOBQaQBIo7epFHsPw1M6OkeC_A0/htmlview?gid=1281688000&widget=true"></iframe>
        </div>
    </div>

</div>

<footer>Boutique de Tendencia — Pedidos por WhatsApp</footer>

<div class="toast-container" id="toastContainer"></div>

<script>
// Sheet tabs config
const SHEETS = [
    { name: "For Phone", gid: "1281688000" },
    { name: "For PC", gid: "1849536669" },
    { name: "OG Shoes", gid: "1992158924" },
    { name: "VIDEO FINDS", gid: "1029580" },
    { name: "TOPS!!", gid: "947549785" },
    { name: "BOTTOMS!!", gid: "232440765" },
    { name: "Hoodie/Jacket", gid: "1358970695" },
    { name: "ACCESSORIES!", gid: "1720729625" },
    { name: "CLOTHING SETS!", gid: "1893412485" },
    { name: "ELECTRONICS!", gid: "1900260319" },
    { name: "ROOM DECOR", gid: "146896372" },
    { name: "Cologne", gid: "775449871" },
    { name: "OLD MONEY", gid: "560558974" },
    { name: "LEGOS", gid: "555272938" },
    { name: "Puffers", gid: "1055322524" },
    { name: "Resell", gid: "657310034" },
    { name: "TOP Batch！", gid: "397312848" }
];
const SHEET_BASE = "https://docs.google.com/spreadsheets/d/17heLb9KsXufVvnBonOBQaQBIo7epFHsPw1M6OkeC_A0/htmlview?gid=";

// Render sheet tabs
(function() {
    const nav = document.getElementById('sheetNav');
    SHEETS.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.textContent = s.name;
        if (i === 0) btn.classList.add('active');
        btn.onclick = () => {
            document.querySelectorAll('.sheet-nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('sheetFrame').src = SHEET_BASE + s.gid + "&widget=true";
        };
        nav.appendChild(btn);
    });
})();

// Cart functions
function getCart() { return JSON.parse(localStorage.getItem('bt_cart') || '[]'); }
function saveCart(cart) { localStorage.setItem('bt_cart', JSON.stringify(cart)); updateCartUI(); }

function addToCart(name, price) {
    let cart = getCart();
    const existing = cart.find(i => i.name === name);
    if (existing) { existing.qty += 1; } else { cart.push({ name, price, qty: 1 }); }
    saveCart(cart);
    showToast('✓ Añadido: ' + name);
}

function updateQty(name, delta) {
    let cart = getCart();
    const idx = cart.findIndex(i => i.name === name);
    if (idx === -1) return;
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    saveCart(cart);
}

function removeFromCart(name) {
    let cart = getCart().filter(i => i.name !== name);
    saveCart(cart);
    showToast('✕ Eliminado: ' + name);
}

function updateCartUI() {
    const cart = getCart();
    const container = document.getElementById('cartItems');
    const totalRow = document.getElementById('cartTotalRow');
    document.getElementById('cartCountBadge').textContent = cart.reduce((s, i) => s + i.qty, 0);

    if (cart.length === 0) {
        container.innerHTML = '<div class="cart-empty">No has añadido productos aún.</div>';
        totalRow.style.display = 'none';
        return;
    }
    totalRow.style.display = 'flex';
    container.innerHTML = cart.map(item => `
        <div class="cart-row">
            <span class="c-name">${item.name}</span>
            <span class="c-price">${item.price} €</span>
            <div class="c-qty">
                <button onclick="updateQty('${item.name.replace(/'/g, "\\'")}',-1)">−</button>
                <span>${item.qty}</span>
                <button onclick="updateQty('${item.name.replace(/'/g, "\\'")}',1)">+</button>
            </div>
            <button class="c-del" onclick="removeFromCart('${item.name.replace(/'/g, "\\'")}')">✕</button>
        </div>
    `).join('');
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById('cartTotal').textContent = total + ' €';
}

// Extra product from sheet
function toggleExtraProduct() {
    document.getElementById('extraProductForm').classList.toggle('show');
}

function addExtraProduct() {
    const num = document.getElementById('epNum').value.trim();
    const name = document.getElementById('epName').value.trim();
    const price = document.getElementById('epPrice').value.trim();
    if (!name || !price) { showToast('⚠️ Introduce nombre y precio'); return; }
    const pName = (num ? '#' + num + ' ' : '') + name;
    const pPrice = parseFloat(price.replace(',', '.'));
    if (isNaN(pPrice)) { showToast('⚠️ Precio inválido'); return; }
    addToCart(pName, pPrice);
    document.getElementById('epNum').value = '';
    document.getElementById('epName').value = '';
    document.getElementById('epPrice').value = '';
}

// WhatsApp send
function sendWhatsApp() {
    const cart = getCart();
    const name = document.getElementById('customerName').value.trim();
    const notes = document.getElementById('orderNotes').value.trim();

    if (cart.length === 0) { showToast('⚠️ Añade productos al carrito'); return; }
    if (!name) { showToast('⚠️ Introduce tu nombre'); return; }

    let msg = '🛒 *NUEVO PEDIDO - Boutique de Tendencia*\n\n';
    msg += '*Cliente:* ' + name + '\n';
    if (notes) msg += '*Notas:* ' + notes + '\n';
    msg += '\n*Productos:*\n';
    let total = 0;
    cart.forEach(item => {
        const subtotal = item.price * item.qty;
        msg += '  • ' + item.name + ' x' + item.qty + ' = ' + subtotal + '€\n';
        total += subtotal;
    });
    msg += '\n*TOTAL: ' + total + ' €*';
    msg += '\n\nGracias por tu pedido! 🙌';

    const url = 'https://wa.me/34613768791?text=' + encodeURIComponent(msg);
    window.open(url, '_blank');
}

// Toast
function showToast(text) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = text;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2500);
}

// Remove old product addToCart from external clicks
// Keep products from original site in memory for catalog, but use the sheet now
// Pre-populate quick add suggestions
const QUICK_PRODUCTS = [
    { name: "Zapatillas LV Trainer", price: 710 },
    { name: "Nike Waffle", price: 120 },
    { name: "Nike TN", price: 160 },
    { name: "Sudadera Lacoste", price: 95 },
    { name: "Polo Lacoste", price: 75 },
    { name: "Camiseta Lacoste Negra", price: 45 },
    { name: "Camiseta Entreno Asics", price: 55 },
    { name: "Camiseta Gris Hugo Boss", price: 35 },
    { name: "Camiseta Lacoste Gris", price: 45 }
];

// Render quick add buttons
(function() {
    const container = document.getElementById('cartItems');
    // Add quick add section before cart
    const quickDiv = document.createElement('div');
    quickDiv.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;padding:0.8rem 0 0.5rem;border-top:1px solid rgba(255,255,255,0.06);';
    quickDiv.innerHTML = '<div style="width:100%;font-size:0.6rem;color:#555;text-transform:uppercase;letter-spacing:2px;margin-bottom:0.4rem;">Añadir rápido:</div>';
    QUICK_PRODUCTS.forEach(p => {
        const btn = document.createElement('button');
        btn.textContent = p.name + ' ' + p.price + '€';
        btn.style.cssText = 'background:transparent;border:1px solid #333;color:#aaa;padding:0.4rem 0.8rem;border-radius:50px;font-size:0.6rem;cursor:pointer;font-family:inherit;transition:all 0.2s;';
        btn.onmouseenter = () => { btn.style.borderColor = '#fff'; btn.style.color = '#fff'; };
        btn.onmouseleave = () => { btn.style.borderColor = '#333'; btn.style.color = '#aaa'; };
        btn.onclick = () => addToCart(p.name, p.price);
        quickDiv.appendChild(btn);
    });
    container.parentNode.insertBefore(quickDiv, container);
})();

// Init
updateCartUI();
</script>
</body>
</html>
